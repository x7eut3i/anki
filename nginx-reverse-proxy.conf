# ============================================================
# Anki Flashcard App — Nginx Reverse Proxy Configuration
#
# Add this to your existing nginx reverse proxy.
#
# Setup:
#   1. Replace "anki.example.com" with your actual domain
#   2. Replace "anki-app:8000" with your container name / IP:port
#   3. Ensure the nginx container and anki container are on the
#      same Docker network:
#        docker network create web
#        docker run --network web --name anki-app ...
#        docker run --network web --name nginx ...
#   4. Include this file in your nginx config:
#        include /etc/nginx/conf.d/anki.conf;
#
# For HTTPS, add a second server block or use certbot/acme.sh
# to auto-generate SSL certificates.
# ============================================================

server {
    listen 80;
    server_name anki.example.com;          # ← your domain

    client_max_body_size 50M;

    location / {
        proxy_pass http://anki-app:8000;   # ← container name:port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # WebSocket support (for future live features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

