<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" />
  <!-- Back card (slightly rotated) -->
  <g transform="translate(256,256) rotate(-8) translate(-256,-256)">
    <rect x="140" y="110" width="240" height="300" rx="20" fill="#4338ca" opacity="0.5"/>
  </g>
  <!-- Front card -->
  <rect x="130" y="120" width="240" height="300" rx="20" fill="url(#card)" />
  <!-- Brain/sparkle icon on card -->
  <g transform="translate(250,220)">
    <!-- Simplified brain shape -->
    <path d="M-30,-30 C-30,-55 -10,-65 5,-55 C15,-65 35,-55 35,-35 C50,-30 50,-10 40,0 C50,15 40,35 25,35 C20,50 0,55 -10,45 C-25,50 -40,40 -40,25 C-55,20 -55,0 -45,-10 C-50,-25 -40,-35 -30,-30Z" fill="none" stroke="#6366f1" stroke-width="5" stroke-linejoin="round"/>
    <!-- Sparkle dots -->
    <circle cx="-5" cy="-10" r="4" fill="#8b5cf6"/>
    <circle cx="10" cy="5" r="3" fill="#a78bfa"/>
    <circle cx="-15" cy="8" r="3" fill="#a78bfa"/>
  </g>
  <!-- Lines on card (text placeholder) -->
  <rect x="165" y="290" width="120" height="8" rx="4" fill="#c7d2fe"/>
  <rect x="165" y="310" width="90" height="8" rx="4" fill="#e0e7ff"/>
  <rect x="165" y="330" width="105" height="8" rx="4" fill="#e0e7ff"/>
  <!-- Small star accent -->
  <g transform="translate(340,150)">
    <polygon points="0,-15 4,-5 15,-5 6,2 9,13 0,7 -9,13 -6,2 -15,-5 -4,-5" fill="#fbbf24"/>
  </g>
</svg>
